  <meta property="og:title" content="Bloom — your focus grows a garden" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Bloom — your focus grows a garden" />
  <meta name="twitter:description" content="A cozy free planner where every focused minute grows a little plant." />
  <meta name="twitter:image" content="https://bloomgardenapp.github.io/og.png" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#F4F0E2" id="theme-color-meta" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />

  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar" aria-label="Navigation"></aside>
    <main id="view"></main>
  </div>
  <div id="toasts" aria-live="polite"></div>
  <noscript>Bloom needs JavaScript to grow 🌱</noscript>
  <script type="module" src="js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
    }
  </script>
  <!-- GoatCounter analytics — privacy-friendly visit counts at jasmine.goatcounter.com.
       no_onload + manual counting so each hash page (today/garden/focus…) counts separately. -->
  <script>window.goatcounter = { no_onload: true };</script>
  <script data-goatcounter="https://jasmine.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <script>
    (function () {
      var page = function () { return '/' + (location.hash.replace(/^#\/?/, '') || 'today'); };
      var send = function () { if (window.goatcounter && window.goatcounter.count) window.goatcounter.count({ path: page() }); };
      var first = function () { if (window.goatcounter && window.goatcounter.count) send(); else setTimeout(first, 400); };
      window.addEventListener('hashchange', send);
      first();
    })();
  </script>
</body>
</html>
